services:
  postgres:
    image: postgres:16-alpine
    container_name: marista-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marista
      POSTGRES_PASSWORD: marista
      POSTGRES_DB: marista
    ports:
      - '5434:5432'
    volumes:
      - marista-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marista -d marista']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  marista-pgdata:
